<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart EMI & Financial Planner</title>

    <link rel="stylesheet" href="style.css">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

    <div class="container">

        <div class="toggle-container">
            <button onclick="toggleDarkMode()" class="dark-btn">
                Toggle Dark Mode
            </button>
        </div>

        <h1>💰 Smart EMI & Financial Planner</h1>

        <p class="subtitle">
            Calculate your loan EMI and plan your finances easily.
        </p>

        <div class="input-box">
            <label>Loan Amount (₹)</label>
            <input type="number" id="loanAmount" placeholder="Enter loan amount">
        </div>

        <div class="input-box">
            <label>Interest Rate (%)</label>
            <input type="number" id="interestRate" placeholder="Enter annual interest rate">
        </div>

        <div class="input-box">
            <label>Loan Tenure (Years)</label>
            <input type="number" id="loanTenure" placeholder="Enter tenure in years">
        </div>

        <button onclick="calculateEMI()">Calculate EMI</button>

        <button onclick="resetFields()" class="reset-btn">
            Reset
        </button>

        <div class="result">

            <h2>Results</h2>

            <p><strong>Monthly EMI:</strong> ₹ <span id="emi">0</span></p>

            <p><strong>Total Interest:</strong> ₹ <span id="interest">0</span></p>

            <p><strong>Total Payment:</strong> ₹ <span id="total">0</span></p>

        </div>

        <div class="chart-container">
            <canvas id="emiChart"></canvas>
        </div>

        <div class="footer">

            <h3>Anuja Shrikant Naik</h3>

            <p>Email: naikanuja965@gmail.com</p>

            <a href="https://digitalheroesco.com" target="_blank">
                <button class="dh-btn">
                    Built for Digital Heroes
                </button>
            </a>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
